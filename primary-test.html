<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primary Test Detail</title>
 <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap-grid.min.css"
    />
    <link rel="stylesheet" href="css/package.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<style>
  .test-name-box {
  background: linear-gradient(135deg, #02A3B6, #0d6efd);
  border-radius: 20px;
  padding: 80px 40px;
  color: #fff;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15);
  min-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.big-test-name {
  font-size: 34px;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
}
</style>

<body>

  <div class="container package-detail-section">
    <div class="row align-items-center">

      <!-- LEFT SIDE -->
      <div class="col-lg-6">
        <div id="testDetail"></div>
      </div>

      <!-- RIGHT SIDE -->
     <div class="col-lg-6 text-center">
  <div class="test-name-box" id="testNameBox"></div>
</div>

    </div>
  </div>

  <script src="js/main.js"></script>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/primary-test.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  const tl = gsap.timeline();

tl.from("#testDetail", {
  x: -80,
  opacity: 0,
  duration: 1,
  ease: "power3.out"
})

.from("#testNameBox", {
  x: 80,
  opacity: 0,
  duration: 1,
  ease: "power3.out"
}, "-=0.6")

.from(".book-btn", {
  scale: 0.8,
  opacity: 0,
  duration: 0.5,
  ease: "back.out(1.7)"
}, "-=0.4");
</script>
</body>
</html>
